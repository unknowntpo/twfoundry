services:
  starrocks-fe:
    image: starrocks/fe-ubuntu:4.0-latest
    container_name: twfoundry-starrocks-fe
    hostname: starrocks-fe
    user: root
    command: |
      bash /opt/starrocks/fe/bin/start_fe.sh --host_type FQDN
    ports:
      - "8030:8030"
      - "9020:9020"
      - "9030:9030"
    healthcheck:
      test: 'mysql -u root -h starrocks-fe -P 9030 -e "SHOW FRONTENDS\\G" | grep "Alive: true"'
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - starrocks-net
    volumes:
      - starrocks-fe-meta:/opt/starrocks/fe/meta

  starrocks-be:
    image: starrocks/be-ubuntu:4.0-latest
    container_name: twfoundry-starrocks-be
    hostname: starrocks-be
    user: root
    depends_on:
      starrocks-fe:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        ulimit -n 65535
        sleep 15s
        mysql --connect-timeout 2 -h starrocks-fe -P 9030 -u root -e "ALTER SYSTEM ADD BACKEND \"starrocks-be:9050\";"
        bash /opt/starrocks/be/bin/start_be.sh
    ports:
      - "8040:8040"
      - "9050:9050"
      - "9060:9060"
    healthcheck:
      test: 'mysql -u root -h starrocks-fe -P 9030 -e "SHOW BACKENDS\\G" | grep "Alive: true"'
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - starrocks-net
    environment:
      - HOST_TYPE=FQDN
    volumes:
      - starrocks-be-storage:/opt/starrocks/be/storage

networks:
  starrocks-net:

volumes:
  starrocks-fe-meta:
  starrocks-be-storage:
