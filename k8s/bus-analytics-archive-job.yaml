apiVersion: batch/v1
kind: Job
metadata:
  name: bus-analytics-archive
  namespace: twfoundry-data
  labels:
    app.kubernetes.io/name: bus-analytics-archive
    app.kubernetes.io/part-of: twfoundry-batch
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bus-analytics-archive
        app.kubernetes.io/part-of: twfoundry-batch
    spec:
      restartPolicy: Never
      containers:
        - name: archive
          image: ghcr.io/unknowntpo/twfoundry/bus-batch-job:latest
          imagePullPolicy: Always
          # Re-publishes each service day from ClickHouse (no TTL, source of truth) and
          # uploads it to an immutable R2 prefix analytics/bus/by-date/<date>/, so the
          # dashboard keeps a PERMANENT per-day history instead of only the "latest" snapshot.
          # No /lake mount: the days are already loaded in ClickHouse, so this reads CH only
          # (zero TDX cost). Range is one-shot backfill; the daily DAG archives the latest day.
          command:
            - node
            - infra/clickhouse/scripts/archive-bus-analytics-by-date.mjs
            - --from-date
            - "2026-06-22"
            - --to-date
            - "2026-06-27"
          env:
            - name: CLICKHOUSE_URL
              value: http://clickhouse:8123
            - name: CLICKHOUSE_DATABASE
              value: twfoundry
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              value: ""
            - name: R2_BUCKET
              value: twfoundry-poc-archive
            - name: WRANGLER_BIN
              value: wrangler
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: twfoundry-track-b-secrets
                  key: CLOUDFLARE_API_TOKEN
            - name: CLOUDFLARE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: twfoundry-track-b-secrets
                  key: CLOUDFLARE_ACCOUNT_ID
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
