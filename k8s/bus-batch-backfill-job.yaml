apiVersion: batch/v1
kind: Job
metadata:
  name: bus-batch-backfill
  namespace: twfoundry-data
  labels:
    app.kubernetes.io/name: bus-batch-backfill
    app.kubernetes.io/part-of: twfoundry-batch
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bus-batch-backfill
        app.kubernetes.io/part-of: twfoundry-batch
    spec:
      restartPolicy: Never
      containers:
        - name: backfill
          image: ghcr.io/unknowntpo/twfoundry/bus-batch-job:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
            - |
              SERVICE_DATE="$(
                for file in /lake/*.jsonl; do
                  [ -e "${file}" ] || continue
                  basename "${file}" .jsonl
                done | sort | tail -1
              )"
              if [ -z "${SERVICE_DATE}" ]; then
                echo "no lake JSONL files found under /lake" >&2
                exit 1
              fi
              node infra/clickhouse/scripts/run-bus-service-health-pipeline.mjs \
                --service-date "${SERVICE_DATE}" \
                --lookback-days "${BACKFILL_LOOKBACK_DAYS}" \
                --lake-dir /lake \
                --output-root /out
              node infra/clickhouse/scripts/upload-bus-analytics.mjs \
                --input-root /out \
                --prefix analytics/bus \
                --wrangler wrangler
          env:
            - name: BACKFILL_LOOKBACK_DAYS
              value: "7"
            - name: CLICKHOUSE_URL
              value: http://clickhouse:8123
            - name: CLICKHOUSE_DATABASE
              value: twfoundry
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              value: ""
            - name: R2_BUCKET
              value: twfoundry-poc-archive
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: twfoundry-track-b-secrets
                  key: CLOUDFLARE_API_TOKEN
            - name: CLOUDFLARE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: twfoundry-track-b-secrets
                  key: CLOUDFLARE_ACCOUNT_ID
          volumeMounts:
            - name: bus-lake
              mountPath: /lake
              readOnly: true
            - name: output
              mountPath: /out
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: bus-lake
          persistentVolumeClaim:
            claimName: bus-lake
            readOnly: true
        - name: output
          emptyDir:
            sizeLimit: 512Mi
